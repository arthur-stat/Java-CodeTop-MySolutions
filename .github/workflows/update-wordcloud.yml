name: Update Algorithm Word Cloud

on:
  push:
    branches: [ main, master ]
    paths:
      - '**.md'

jobs:
  update-wordcloud:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    env:
      RELEASE_TAG: wordcloud-latest
      RELEASE_TITLE: Algorithm Word Cloud

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: pip install wordcloud pillow

    - name: Check and install Chinese fonts
      run: |
        if [ -f "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc" ]; then
          echo "Noto CJK 字已存在"
        else
          echo "安装中文字体..."
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          echo "字体安装完成"
        fi

    - name: Run word cloud generator
      env:
        FONT_PATH: "/usr/share/fonts/opentype/noto/NotoSansCJK-Regular.ttc"
      run: |
        python REgen_wordcloud.py

    - name: Ensure fixed release exists
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" > /dev/null 2>&1; then
          echo "Release $RELEASE_TAG already exists"
        else
          gh release create "$RELEASE_TAG" \
            --repo "$GITHUB_REPOSITORY" \
            --target "$GITHUB_SHA" \
            --title "$RELEASE_TITLE" \
            --notes "Latest generated algorithm word cloud."
        fi

    - name: Upload word cloud asset
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        gh release upload "$RELEASE_TAG" ./images/00.png#00.png --repo "$GITHUB_REPOSITORY" --clobber
